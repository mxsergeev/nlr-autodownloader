services:
  server:
    build:
      context: ./server
    group_add:
      - "${NEXTCLOUD_GID:-33}"
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-3333}:3333"
    volumes:
      - ./server/:/app
      - /app/node_modules
      - .env:/.env:ro
      - ${DOWNLOADS_DIR:-./data/downloads}:/data/downloads:shared
      - queries_data:/data/queries
    depends_on:
      postgres:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    command: /bin/sh -c 'npx prisma migrate deploy && if [ "$NODE_ENV" = "development" ]; then npm run dev; else npm start; fi'

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    command: /bin/sh -c 'if [ "$NODE_ENV" = "development" ]; then npm run dev -- --host 0.0.0.0; else npm run build && npm run start -- --port 5173 --host 0.0.0.0; fi'

  redis:
    image: redis:8.6.1-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nlr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nlr_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nlr_autodownloader}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-nlr} -d ${POSTGRES_DB:-nlr_autodownloader}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  queries_data:
  redis_data:
  postgres_data:
