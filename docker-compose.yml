services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    group_add:
      - "${NEXTCLOUD_GID:-33}"
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-3333}:3333"
    volumes:
      - ./server/:/app
      - ./shared/:/app/shared
      - ./shared/:/shared
      - /app/node_modules
      - .env:/.env:ro
      - ${DOWNLOADS_DIR:-./data/downloads}:/data/downloads:shared
      - queries_data:/data/queries
    restart: unless-stopped
    command: /bin/sh -c 'npx prisma generate && npx prisma db push && if [ "$NODE_ENV" = "development" ]; then npm run db:studio & STUDIO_PID=$!; npm run dev; kill $STUDIO_PID 2>/dev/null; else npm start; fi'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    environment:
      - VITE_SERVER_HOST=server
      - VITE_SERVER_PORT=3333
    depends_on:
      server:
        condition: service_started
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - ./shared/:/app/shared
      - /app/node_modules
    restart: unless-stopped
    command: /bin/sh -c 'if [ "$NODE_ENV" = "development" ]; then npm run dev -- --host 0.0.0.0; else npm run build && npm run start -- --port 5173 --host 0.0.0.0; fi'

  redis:
    image: redis:8.6.1-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

volumes:
  queries_data:
  redis_data:
